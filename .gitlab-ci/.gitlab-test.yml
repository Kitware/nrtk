###############################################################################
###############################################################################
# Stage -- Unit Testing
###############################################################################

.test-setup:
  extends: .tox-setup
  stage: test
  tags:
    - autoscaler
  rules:
    - !reference [.shared-setup, rules]
  before_script:
    - !reference [.tox-setup, before_script]

.tox:pytest:
  extends: .test-setup
  tags:
    - $RUNNER_TAG
  parallel:
    matrix:
      - TOX_ENV: core
        RUNNER_TAG: small-cpu
      - TOX_ENV: opencv
        RUNNER_TAG: small-cpu
      - TOX_ENV: albumentations
        RUNNER_TAG: small-cpu
      - TOX_ENV: pillow
        RUNNER_TAG: small-cpu
      - TOX_ENV: skimage
        RUNNER_TAG: small-cpu
      - TOX_ENV: pybsm
        RUNNER_TAG: medium-cpu
      - TOX_ENV: maite
        RUNNER_TAG: medium-cpu
      - TOX_ENV: tools
        RUNNER_TAG: medium-cpu
      - TOX_ENV: waterdroplet
        RUNNER_TAG: medium-cpu
      - TOX_ENV: diffusion
        RUNNER_TAG: autoscaler
      - TOX_ENV: doctests
        RUNNER_TAG: autoscaler
      - TOX_ENV: notebooks
        RUNNER_TAG: autoscaler
  script:
    # Convert PYTHON_VERSION (3.10) to tox factor (py310) and run specific env
    - tox -e "py${PYTHON_VERSION//./}-${TOX_ENV}"
  artifacts:
    when: always
    paths:
     - ".coverage.*"
    reports:
      junit: ".junit.*.xml"
    expire_in: 1 day

tox:pytest:py3.10:
  extends: .tox:pytest
  image: python:3.10
  variables:
    PYTHON_VERSION: "3.10"

tox:pytest:py3.11:
  extends: .tox:pytest
  image: python:3.11
  variables:
    PYTHON_VERSION: "3.11"

tox:pytest:py3.12:
  extends: .tox:pytest
  image: python:3.12
  variables:
    PYTHON_VERSION: "3.12"

tox:pytest:py3.13:
  extends: .tox:pytest
  image: python:3.13
  variables:
    PYTHON_VERSION: "3.13"

.tox:coverage:version:
  extends: .test-setup
  tags:
    - small-cpu
  before_script:
    - !reference [.shared-setup, before_script]
    # Install dependencies (coverage is in the tests dependency group)
    - poetry sync --only tests -q
  script:
    # Combine all the coverage reports from the pytest matrix for this
    # Python version into a single database file.
    - poetry run coverage combine ./.coverage.*
    # Rename combined file so the final coverage job can distinguish versions.
    - mv .coverage ".coverage.${PYTHON_VERSION}"
  artifacts:
    when: always
    paths:
      - ".coverage.*"
    expire_in: 1 day

tox:coverage:py3.10:
  extends: .tox:coverage:version
  variables:
    PYTHON_VERSION: "3.10"
  dependencies:
    - tox:pytest:py3.10
  needs:
    - job: tox:pytest:py3.10
      artifacts: true

tox:coverage:py3.11:
  extends: .tox:coverage:version
  variables:
    PYTHON_VERSION: "3.11"
  dependencies:
    - tox:pytest:py3.11
  needs:
    - job: tox:pytest:py3.11
      artifacts: true

tox:coverage:py3.12:
  extends: .tox:coverage:version
  variables:
    PYTHON_VERSION: "3.12"
  dependencies:
    - tox:pytest:py3.12
  needs:
    - job: tox:pytest:py3.12
      artifacts: true

tox:coverage:py3.13:
  extends: .tox:coverage:version
  variables:
    PYTHON_VERSION: "3.13"
  dependencies:
    - tox:pytest:py3.13
  needs:
    - job: tox:pytest:py3.13
      artifacts: true

tox:coverage:
  extends: .test-setup
  tags:
    - small-cpu
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+(?:\.\d+)?%)/'
  dependencies:
    - tox:coverage:py3.10
    - tox:coverage:py3.11
    - tox:coverage:py3.12
    - tox:coverage:py3.13
  needs:
    - job: tox:coverage:py3.10
      artifacts: true
    - job: tox:coverage:py3.11
      artifacts: true
    - job: tox:coverage:py3.12
      artifacts: true
    - job: tox:coverage:py3.13
      artifacts: true
  script:
    - tox -e coverage
  artifacts:
    when: always
    paths:
      - ".coverage"
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 day

.tox:notebooks:
  extends: .test-setup
  tags:
    - $RUNNER_TAG
  image: python:3.10
  dependencies: []
  rules:
    # If changes are made to an active merge request.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success
    - when: never  # explicit fail-exclude terminal condition.
  allow_failure: true
  script:
    - tox -r -e papermill -- "${NOTEBOOK_DIR}/${NOTEBOOK_FILE}" /dev/null

tox:notebooks:examples:
  extends: .tox:notebooks
  parallel:
    matrix:
      - NOTEBOOK_DIR: "docs/examples"
        NOTEBOOK_FILE: [
          "albumentations_perturber.ipynb",
          "nrtk_tutorial.ipynb",
          "optical_perturbers.ipynb",
          "photometric_perturbers.ipynb",
          "pybsm_default_config.ipynb"
        ]
        RUNNER_TAG: autoscaler
      - NOTEBOOK_DIR: "docs/examples"
        NOTEBOOK_FILE: "generative_perturbers.ipynb"
        RUNNER_TAG: single-gpu

tox:notebooks:maite:
  extends: .tox:notebooks
  parallel:
    matrix:
      - NOTEBOOK_DIR: "docs/examples/maite"
        NOTEBOOK_FILE: [
          "nrtk_affine_perturbers_demo.ipynb",
          "nrtk_brightness_perturber_demo.ipynb",
          "nrtk_focus_perturber_demo.ipynb",
          "nrtk_haze_perturber_demo.ipynb",
          "nrtk_jitter_perturber_demo.ipynb",
          "nrtk_lens_flare_demo.ipynb",
          "nrtk_radial_distortion_perturber_demo.ipynb",
          "nrtk_sensor_transformation_demo.ipynb",
          "nrtk_turbulence_perturber_demo.ipynb",
          "jatic-perturbations-saliency.ipynb",
          "nrtk_water_droplet_perturber_demo.ipynb"
        ]
        RUNNER_TAG: autoscaler

# NRTK-XAITK workflow utility tests
# These tests verify the import guard behavior of the notebook helper modules
# in docs/examples/nrtk_xaitk_workflow/. They are lightweight unit tests
# (not notebook execution) and run on every MR push.
# The "core"-marked tests mock missing dependencies to verify import guards.
# The "xaitk"-marked canary tests verify real imports work when deps are present.
xaitk-notebook-tests:
  extends: .test-setup
  tags:
    - small-gpu
  parallel:
    matrix:
      - PYTHON_IMAGE: ["python:3.10", "python:3.11", "python:3.12", "python:3.13"]
  image: $PYTHON_IMAGE
  before_script:
    - !reference [.test-setup, before_script]
    # Install nrtk (no optional extras yet) + test runner
    - poetry install --only-root --sync -q
    - poetry run pip install -q pytest
  script:
    # Import guard tests — deps are NOT installed; mixin mocks missing packages
    - poetry run pytest -rfE --tb=short -q --no-header --disable-warnings
        -m "core"
        docs/examples/nrtk_xaitk_workflow/notebook_tests/
        -o "addopts=" -o "testpaths="
    # Install optional deps for canary tests
    - poetry run pip install -q maite xaitk-saliency torch ultralytics datasets transformers
    # opencv-python-headless avoids libGL.so.1 requirement on headless CI images
    - poetry run pip uninstall -y -q opencv-python opencv-python-headless
    - poetry run pip install -q opencv-python-headless
    # Canary tests — FAIL if deps are installed but imports still break
    - poetry run pytest -rfE --tb=short -q --no-header --disable-warnings
        -m "xaitk"
        docs/examples/nrtk_xaitk_workflow/notebook_tests/
        -o "addopts=" -o "testpaths="
